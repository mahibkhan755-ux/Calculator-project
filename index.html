<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>calculatore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="box">
        <input type="text" id="input" placeholder="0">
        <div id="box-1">
            <button id="ac">Ac</button>
            <button id="del">Del</button>
            <button id="eql">=</button>
            <button>.</button>
        </div>
        <div id="box-2">
            <button>%</button>
            <button>*</button>
            <button>+</button>
            <button>-</button>
        </div>
        <div id="box-3">
            <button>9</button>
            <button>8</button>
            <button>7</button>
            <button>6</button>
        </div>
        <div id="box-4">
            <button>5</button>
            <button>4</button>
            <button>3</button>
            <button>2</button>
        </div>
        <div id="box5">
            <button>1</button>
            <button>0</button>
            <button>00</button>
            <button>/</button>
        </div>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
